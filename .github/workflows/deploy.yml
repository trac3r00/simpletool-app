name: Deploy Worker

on:
  push:
    branches: ["main"]

permissions:
  contents: read

# Serialize production deploys so an older SHA cannot overwrite a newer one.
# cancel-in-progress: false → queue, do not cancel — we want order, not skip.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (creates dist/)
        run: bun run build

      - name: Upload dist artifact (gates the rest of the pipeline)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
          if-no-files-found: error

  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build is required: src/utils/common-ui.js imports bundled-styles.js,
      # and vendor-sri.test.js checks files in dist/vendor/.
      # The build artifact is only dist/; it does NOT include generated src/ files.
      - name: Build (generate bundled-styles.js and dist/vendor files)
        run: bun run build

      - name: Run unit tests
        run: bun run test

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    env:
      CI: "true"
      # PW_SKIP_BUILD=1 tells playwright.config.js webServer to skip its
      # `bun run build` fallback because dist/ comes from the build artifact.
      # Closes ARTIFACT-PROVENANCE-GAP: e2e tests run against the same dist/
      # that the deploy job will ship.
      PW_SKIP_BUILD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build is required: src/utils/common-ui.js imports bundled-styles.js,
      # and vendor-sri.test.js checks files in dist/vendor/.
      # The downloadable artifact from the 'build' job only includes dist/;
      # build:ui additionally writes to src/utils/bundled-styles.js.
      - name: Build (generate bundled-styles.js and dist/vendor files)
        run: bun run build

      - name: Download dist artifact (the build under test)
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Resolve Playwright version
        id: pw
        run: |
          PW_VERSION=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps (cached browsers)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright traces & failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build is required: worker.js imports bundled-styles.js which is generated
      # by build:ui. The dist/ artifact is downloaded next (overwrites local dist/).
      - name: Build (generate bundled-styles.js and dist/vendor files)
        run: bun run build

      - name: Download dist artifact (the exact build that passed tests)
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Wrangler dry-run (preview deploy, catch config errors)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.77.0"
          command: deploy --dry-run --outdir=/tmp/wrangler-preview

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.77.0"
          command: deploy

      - name: Post-deploy smoke (wait for edge propagation, then verify)
        run: |
          sleep 10
          # /health is the JSON health endpoint (src/worker.js)
          curl --fail --silent --show-error --max-time 10 --retry 3 --retry-delay 2 \
            https://simpletool.app/health
          # Home page (HTML)
          curl --fail --silent --show-error --max-time 10 --retry 3 --retry-delay 2 \
            -o /dev/null https://simpletool.app/
          # One representative tool page (HTML)
          curl --fail --silent --show-error --max-time 10 --retry 3 --retry-delay 2 \
            -o /dev/null https://simpletool.app/json-formatter

      - name: Notify Discord
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -z "${WEBHOOK:-}" ]; then
            echo "Discord webhook is not configured; skipping deploy notification."
            exit 0
          fi

          if [ "$STATUS" = "success" ]; then EMOJI="✅"; else EMOJI="❌"; fi
          curl --fail -H "Content-Type: application/json" \
            -d "{\"content\":\"$EMOJI Worker deploy **$STATUS**: **$REPO** @ $SHA (branch $BRANCH)\"}" \
            "$WEBHOOK" || echo "Discord deploy notification failed; preserving deploy job status."
