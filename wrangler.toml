name = "simpletool-app"
main = "src/worker.js"
compatibility_date = "2024-10-25"

[assets]
directory = "dist"
binding = "ASSETS"

[vars]
ENVIRONMENT = "production"
ADSENSE_CLIENT = "ca-pub-5134881365131182"
ADSENSE_SLOTS = "{}"

# Note: Custom domain will be configured via Cloudflare Dashboard after deployment
# Dashboard: Workers & Pages → simpletool-app → Settings → Triggers → Custom Domains
# Add: simpletool.app

[durable_objects]
bindings = [{ name = "RATE_LIMITER", class_name = "RateLimiter" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

[observability.logs]
enabled = true
invocation_logs = true
